    skills: ['build-transformer', 'production-readiness']
    description: 'Default transformer config (no concurrency limits, clearCacheOnTransform: true) works for development but can cause issues under load or on Cloudflare'
    implication: 'Agent generates working transformers with zero production config — looks correct in dev, breaks under real traffic or Cloudflare subrequest limits'

  - name: 'Type safety vs flexibility'
    skills: ['build-transformer', 'hono-integration']
    description: 'Strict typing (includes only on optional props, conditional props requirement) prevents misuse but can confuse agents into adding unnecessary type workarounds'
    implication: 'Agent adds type assertions or any casts to bypass constraints instead of restructuring the output type correctly'

