skills:
  - name: 'Hono Integration'
    slug: 'hono-integration'
    domain: 'framework-integration'
    description: 'Set up t7mMiddleware in a Hono app with typed transforms, query-based includes, wrappers, and custom status codes'
    type: 'framework'
    covers:
      - 't7mMiddleware'
      - 'c.transform()'
      - 'c.transformMany()'
      - 'extras object (includes, wrapper, debug, props)'
      - 'query param parsing (?include=)'
      - 'status codes and headers'
    tasks:
      - 'Wire t7mMiddleware into a Hono app'
      - 'Return transformed data from a route handler'
      - 'Support query-based includes on an endpoint'
      - 'Wrap transformed output in a response envelope'
      - 'Set custom status codes and headers on transform responses'
    failure_modes:
      - mistake: 'Calling transformer.transform() instead of c.transform()'
        mechanism: 'Middleware injects transform on context — calling the transformer directly bypasses query param parsing and response typing'
        wrong_pattern: |
          app.get('/users/:id', async (c) => {
            const user = await getUser(c.req.param('id'))
            return c.json(await userTransformer.transform({ input: user }))
          })
        correct_pattern: |
          app.get('/users/:id', async (c) => {
            const user = await getUser(c.req.param('id'))
            return c.transform(user, userTransformer, {})
          })
        source: 'src/hono/middleware.ts'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Passing props as third argument instead of in extras'
        mechanism: 'c.transform takes (input, transformer, extras) — props go inside the extras object, not as a separate argument'
        wrong_pattern: |
          return c.transform(user, userTransformer, { db })
        correct_pattern: |
          return c.transform(user, userTransformer, { props: { db } })
        source: 'src/hono/types.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Omitting the required extras argument'
        mechanism: 'Unlike Elysia, Hono extras is always required — pass {} when no options needed'
        wrong_pattern: |
          return c.transform(user, transformer)
        correct_pattern: |
          return c.transform(user, transformer, {})
        source: 'src/hono/types.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Not registering middleware before routes'
        mechanism: 't7mMiddleware must be registered with app.use() before route handlers that call c.transform()'
        wrong_pattern: |
          app.get('/users', async (c) => c.transform(user, transformer))
          app.use(t7mMiddleware)
        correct_pattern: |
          app.use(t7mMiddleware)
          app.get('/users', async (c) => c.transform(user, transformer, {}))
        source: 'src/hono/middleware.ts'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Returning c.transform result inside c.json()'
        mechanism: 'c.transform() already returns a typed JSON response — wrapping it in c.json() double-serializes'
        wrong_pattern: |
          return c.json(await c.transform(user, transformer, {}))
        correct_pattern: |
          return c.transform(user, transformer, {})
        source: 'src/hono/middleware.ts'
        priority: 'HIGH'
        status: 'active'

  - name: 'Elysia Integration'
    slug: 'elysia-integration'
    domain: 'framework-integration'
    description: 'Set up t7mPlugin in an Elysia app with typed transforms, query-based includes, and plain data returns'
    type: 'framework'
    covers:
      - 't7mPlugin'
      - 'transform()'
      - 'transformMany()'
      - 'extras object (includes, wrapper, debug, props)'
      - 'query param parsing (?include=)'
    tasks:
      - 'Wire t7mPlugin into an Elysia app'
      - 'Return transformed data from a route handler'
      - 'Support query-based includes on an endpoint'
      - 'Wrap transformed output in a response envelope'
    failure_modes:
      - mistake: 'Expecting a Response object like Hono'
        mechanism: 'Elysia transform returns plain data, not a Response — Elysia handles serialization'
        wrong_pattern: |
          app.get('/users/:id', async ({ transform, params }) => {
            const user = await getUser(params.id)
            const response = await transform(user, transformer)
            return new Response(JSON.stringify(response))
          })
        correct_pattern: |
          app.get('/users/:id', async ({ transform, params }) => {
            const user = await getUser(params.id)
            return transform(user, transformer)
          })
        source: 'src/elysia/plugin.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Passing extras when no props needed'
        mechanism: 'In Elysia, extras is optional when transformer has no Props type — agents often pass an empty object anyway'
        wrong_pattern: |
          return transform(user, transformer, {})
        correct_pattern: |
          return transform(user, transformer)
        source: 'src/elysia/types.ts'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Passing props directly instead of in extras'
        mechanism: 'The third argument is the extras object containing props, includes, wrapper, and debug — not the props value directly'
        wrong_pattern: |
          return transform(user, transformer, { db })
        correct_pattern: |
          return transform(user, transformer, { props: { db } })
        source: 'src/elysia/types.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Trying to set status codes in transform return'
        mechanism: 'Unlike Hono, Elysia transform has no status parameter — use Elysia set.status instead'
        wrong_pattern: |
          return transform(user, transformer, { status: 201 })
        correct_pattern: |
          set.status = 201
          return transform(user, transformer)
        source: 'src/elysia/plugin.ts'
        priority: 'HIGH'
        status: 'active'

  - name: 'Build Transformer'
    slug: 'build-transformer'
    domain: 'transformer-authoring'
    description: 'Create transformers with data(), includesMap, props, cache, nested transformers, and concurrency control'
    type: 'core'
    covers:
      - 'AbstractTransformer'
      - 'data() method'
      - 'includesMap'
      - 'includes (type-safe and unsafe)'
      - 'props (conditional requirement)'
      - 'Cache with .call()'
      - 'transformers record'
      - 'clearCacheOnTransform'
      - 'concurrency and includesConcurrency'
      - 'InputOf, OutputOf, PropsOf, IncludesOf'
    tasks:
      - 'Create a basic transformer mapping input to output'
      - 'Add optional includes to a transformer'
      - 'Add required props to a transformer'
      - 'Set up caching on a transformer'
      - 'Nest transformers for related data'
      - 'Configure concurrency limits for batch transforms'
    failure_modes:
      - mistake: 'Passing positional args instead of object'
        mechanism: 'All transform methods take a single params object — not positional arguments'
        wrong_pattern: |
          await transformer.transform(user)
          await transformer.transform(user, { includes: ['posts'] })
        correct_pattern: |
          await transformer.transform({ input: user })
          await transformer.transform({ input: user, includes: ['posts'] })
        source: 'CLAUDE.md gotcha #2'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Using cache.get() instead of cache.call()'
        mechanism: 'Cache exposes .call() to invoke the cached function, not .get()'
        wrong_pattern: |
          const user = await this.cache.userProfile.get(input.userId)
        correct_pattern: |
          const user = await this.cache.userProfile.call(input.userId)
        source: 'CLAUDE.md gotcha #3'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Putting required properties in includesMap'
        mechanism: 'Includes only work with optional output properties — enforced by OnlyPossiblyUndefined<TOutput>'
        wrong_pattern: |
          type Output = { name: string; avatar: string }
          includesMap = { avatar: async () => '...' }  // avatar is required
        correct_pattern: |
          type Output = { name: string; avatar?: string }
          includesMap = { avatar: async () => '...' }  // avatar is optional
        source: 'CLAUDE.md gotcha #7'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Passing clearCacheOnTransform to Cache constructor'
        mechanism: 'clearCacheOnTransform is an AbstractTransformer constructor option, not a Cache option'
        wrong_pattern: |
          new Cache(fn, { clearCacheOnTransform: false })
        correct_pattern: |
          constructor() { super({ clearCacheOnTransform: false }) }
        source: 'CLAUDE.md gotcha #5'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using transformers as an array'
        mechanism: 'transformers is a Record<string, AnyAbstractTransformer | Cache<() => AnyAbstractTransformer>>, not an array'
        wrong_pattern: |
          transformers = [this.authorTransformer]
        correct_pattern: |
          transformers = { author: this.authorTransformer }
        source: 'CLAUDE.md gotcha #4'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Setting includesConcurrency in constructor'
        mechanism: 'includesConcurrency is a class property like includesMap, not a constructor parameter'
        wrong_pattern: |
          constructor() { super({ includesConcurrency: { posts: 3 } }) }
        correct_pattern: |
          includesConcurrency = { posts: 3 }
        source: 'CLAUDE.md gotcha #10'
        priority: 'HIGH'
        status: 'active'

  - name: 'Production Readiness'
    slug: 'production-readiness'
    domain: 'production-ops'
    description: 'Configure concurrency limits, caching strategy, and Cloudflare-specific constraints for production t7m deployments'
    type: 'lifecycle'
    covers:
      - 'concurrency constructor option'
      - 'includesConcurrency class property'
      - 'Semaphore'
      - 'clearCacheOnTransform'
      - 'Cache maxSize'
      - 'Cloudflare Workers subrequest limits'
    tasks:
      - 'Set concurrency limits for batch transforms'
      - 'Configure per-include concurrency for external API calls'
      - 'Tune cache behavior for high-throughput endpoints'
      - 'Deploy t7m to Cloudflare Workers within subrequest limits'
    failure_modes:
      - mistake: 'No concurrency limit on Cloudflare Workers'
        mechanism: 'Cloudflare Workers have strict subrequest limits (6 concurrent, 50 total) — unbounded transformMany with external calls will hit this'
        wrong_pattern: |
          class UserTransformer extends AbstractTransformer<In, Out> {
            constructor() { super() }
          }
        correct_pattern: |
          class UserTransformer extends AbstractTransformer<In, Out> {
            constructor() { super({ concurrency: 5 }) }
          }
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Expecting concurrency to limit single transform calls'
        mechanism: 'concurrency only throttles transformMany/transformMany — single transform() calls are not limited by it'
        wrong_pattern: |
          // Assuming concurrency: 5 limits parallel transform() calls
          await Promise.all(users.map(u => transformer.transform({ input: u })))
        correct_pattern: |
          // Use transformMany for batch operations with concurrency control
          await transformer.transformMany({ inputs: users })
        source: 'CLAUDE.md gotcha #9'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Unbounded cache without maxSize'
        mechanism: 'Cache grows without limit by default — high-cardinality keys cause memory issues'
        wrong_pattern: |
          cache = { userProfile: new Cache((id: string) => fetchUser(id)) }
        correct_pattern: |
          cache = { userProfile: new Cache((id: string) => fetchUser(id), { maxSize: 100 }) }
        source: 'src/lib/cache.ts'
        priority: 'HIGH'
        status: 'active'

tensions:
